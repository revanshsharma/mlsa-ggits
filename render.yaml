services:
  - type: web
    name: mlsa-ggits-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @workspace/api-server build
    startCommand: corepack pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    autoDeploy: true
    disk:
      name: gallery-data
      mountPath: /var/data/gallery
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: LOCAL_GALLERY_DIR
        value: /var/data/gallery
