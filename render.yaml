services:
  - type: web
    name: mlsa-ggits-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @workspace/api-server build
    startCommand: corepack pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: mlsa-ggits/gallery
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
